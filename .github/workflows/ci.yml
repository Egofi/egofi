name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: 22

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: egofi
          POSTGRES_PASSWORD: egofi_test
          POSTGRES_DB: egofi_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://egofi:egofi_test@localhost:5432/egofi_test
      # CI runs `prisma generate`, lint, typecheck and unit tests — it never opens
      # a connection — so both roles can point at the same URL here.
      DIRECT_DATABASE_URL: postgresql://egofi:egofi_test@localhost:5432/egofi_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-minimum-32-characters
      ADMIN_JWT_SECRET: ci-admin-test-secret-32-chars-min
      WEBHOOK_SIGNING_SECRET: ci-webhook-secret
      TATUM_API_KEY: ci-placeholder
      TATUM_WEBHOOK_HMAC_SECRET: ci-placeholder
      CHANGENOW_API_KEY: ci-placeholder
      SIMPLESWAP_API_KEY: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client must exist before type-checking — the backend imports
      # generated model types from @prisma/client.
      - name: Generate Prisma client
        run: pnpm --filter @egofi/backend db:generate

      - name: Lint (Biome)
        run: pnpm turbo run lint

      - name: Type-check
        run: pnpm turbo run typecheck

      - name: Run migrations
        run: pnpm --filter @egofi/backend db:migrate

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

  # ── Deploy the backend to the server on every push to main ──────────────────
  # Frontends (checkout / merchants / admin) auto-deploy via Vercel's own GitHub
  # integration, so this job only handles the backend: build the image, push it
  # to GHCR, then pull + migrate + restart on the host over SSH.
  deploy-backend:
    name: Deploy backend
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      # Surfaced so the SSH step can no-op until the deploy secrets are set,
      # instead of failing the job on the very first push.
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/egofi/egofi-backend:latest
            ghcr.io/egofi/egofi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/egofi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull backend
            # Apply any new migrations with the new image (owner role via DIRECT_DATABASE_URL); idempotent.
            docker compose -f docker-compose.prod.yml run --rm backend node_modules/.bin/prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d backend
            docker logout ghcr.io
            docker image prune -f
