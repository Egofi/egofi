# Runs only infrastructure for local development (apps run with `pnpm dev`)
name: egofi-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: egofi
      POSTGRES_PASSWORD: egofi_dev
      POSTGRES_DB: egofi
    ports:
      # Bound to IPv4 loopback on purpose. An unqualified "5433:5432" also opens
      # an IPv6 listener, and Node resolves `localhost` to ::1 first — if Docker's
      # relay wedges on that address, every client hangs. It also keeps the dev
      # database off the LAN. Host 5433: 5432 is held by another local project.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egofi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # IPv4 loopback only — see the note on postgres above.
      - "127.0.0.1:6380:6379" # host 6380 — 6379 is held by another local project
    volumes:
      - redis_dev_data:/data

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090" # host 9091 — 9090 is held by another local project

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: egofi_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3100:3000"
    depends_on:
      - prometheus

volumes:
  postgres_dev_data:
  redis_dev_data:
  prometheus_dev_data:
  grafana_dev_data:
